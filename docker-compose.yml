services:
  # 1. Nginx Web Server
  bdn_karanganyar_web:
    image: nginx:alpine
    container_name: bdn_karanganyar_web
    ports:
      - "8081:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
      - ./html:/var/www/html
    depends_on:
      - bdn_karanganyar_app
    networks:
      - bdn_karanganyar_network
    restart: unless-stopped

  # 2. PHP-FPM Application
  bdn_karanganyar_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bdn_karanganyar_app
    volumes:
      - ./html:/var/www/html
    depends_on:
      - bdn_karanganyar_db
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: bdn_karanganyar_db
      DB_PORT: 3306
      DB_DATABASE: bdn_karanganyar_db
      DB_USERNAME: root
      DB_PASSWORD: root
    networks:
      - bdn_karanganyar_network
    restart: unless-stopped

  # 3. MySQL Database
  bdn_karanganyar_db:
    image: mysql:8.0
    container_name: bdn_karanganyar_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bdn_karanganyar_db
    ports:
      - "3306:3306"
    volumes:
      - bdn_karanganyar_db_data:/var/lib/mysql
    networks:
      - bdn_karanganyar_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "-proot"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

networks:
  bdn_karanganyar_network:
    driver: bridge

volumes:
  bdn_karanganyar_db_data: