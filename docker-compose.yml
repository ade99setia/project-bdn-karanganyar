services:
  # =========================
  # App: PHP-FPM Laravel
  # =========================
  app_bdn_karanganyar:
    image: ghcr.io/ade99setia/bdn_karanganyar_app:latest
    container_name: bdn_karanganyar_app
    env_file:
      - ./.env
    volumes:
      - public_app:/var/www/html/public
      - storage_app:/var/www/html/storage
    networks:
      - app_network_bdn_karanganyar
    restart: unless-stopped

  # =========================
  # Web: Nginx
  # =========================
  web_bdn_karanganyar:
    image: nginx:alpine
    container_name: bdn_karanganyar_web
    ports:
      - "8081:80"  # akses localhost:8081
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
      - public_app:/var/www/html/public  # <- Nginx baca public folder dari app
    depends_on:
      - app_bdn_karanganyar
    networks:
      - app_network_bdn_karanganyar
      - shared_web_network
    restart: unless-stopped

  # =========================
  # Database: MySQL
  # =========================
  db_bdn_karanganyar:
    image: mysql:8.0
    container_name: bdn_karanganyar_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bdn_karanganyar_db
      MYSQL_USER: bdn_user
      MYSQL_PASSWORD: strongpassword123
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network_bdn_karanganyar
    restart: unless-stopped

# =========================
# Networks & Volumes
# =========================
networks:
  app_network_bdn_karanganyar:
    driver: bridge
  shared_web_network:
    external: true

volumes:
  public_app:
  storage_app:
  db_data:
