services:
  # 1. Web Server Nginx
  web:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
      - ./default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - project-bdn-karanganyar
    restart: unless-stopped
    networks:
      - web-net

  # 2. Aplikasi Proyek Laravel
  project-bdn-karanganyar:
    build: 
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - web-net
    environment:
      DB_HOST: db
      DB_DATABASE: db_utama
      DB_USERNAME: root
      DB_PASSWORD: root
      APP_ENV: local
      APP_DEBUG: "false"

  # 3. Database MySQL
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_utama
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - web-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  web-net:

volumes:
  db_data: